version: '3.8'

services:
  caddy:
    image: caddy:latest
    container_name: ecotron-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - ecotron-network
    restart: always

  mongodb:
    image: mongo:latest
    container_name: ecotron-mongodb
    volumes:
      - mongodb_data:/data/db
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD}
    networks:
      - ecotron-network
    restart: always

  minio:
    image: minio/minio:latest
    container_name: ecotron-minio
    volumes:
      - minio_data:/data
    environment:
      - MINIO_ROOT_USER=${MINIO_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_PASSWORD}
    command: server /data --console-address ":9001"
    networks:
      - ecotron-network
    restart: always

  ollama:
    image: ollama/ollama:latest
    container_name: ecotron-ollama
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - ecotron-network
    restart: always

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ecotron-app
    environment:
      - MONGODB_URI=mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongodb:27017/ecotron?authSource=admin
      - MINIO_ENDPOINT=minio
      - MINIO_PORT=9000
      - MINIO_ACCESS_KEY=${MINIO_USER}
      - MINIO_SECRET_KEY=${MINIO_PASSWORD}
      - OLLAMA_HOST=http://ollama:11434
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=https://ecotron.co.in
    depends_on:
      - mongodb
      - minio
      - ollama
    networks:
      - ecotron-network
    restart: always

networks:
  ecotron-network:
    driver: bridge

volumes:
  mongodb_data:
  minio_data:
  ollama_data:
  caddy_data:
  caddy_config:
